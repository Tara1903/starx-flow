<svg width="800" height="240" viewBox="0 0 800 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- The StarX Graphic -->
  <g transform="translate(40, 20) scale(0.5)">
    <path d="M200 40 L220 160 L360 200 L220 230 L200 360 L180 230 L40 200 L180 160 Z" fill="url(#starGrad)"/>
    <path d="M200 160 L210 190 L240 200 L210 210 L200 240 L190 210 L160 200 L190 190 Z" fill="#000000"/>
    <path d="M200 40 L220 160 L360 200 L220 230 L200 360 L180 230 L40 200 L180 160 Z" fill="none" stroke="#6ee7b7" stroke-width="6"/>
  </g>

  <!-- The Text "StarXFlow" -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&amp;display=swap');
    .text-star { font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 80px; fill: #FFFFFF; font-style: italic; }
    .text-x { font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 80px; fill: #10b981; font-style: italic; }
    .text-flow { font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 80px; fill: #10b981; font-style: italic; }
    .tagline { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 16px; fill: #a1a1aa; letter-spacing: 4px; }
  </style>

  <g transform="translate(240, 110)">
    <!-- Manual italic tilt using skewX -->
    <text x="0" y="0" class="text-star" transform="skewX(-15)">Star</text>
    <text x="210" y="0" class="text-x" transform="skewX(-15)">X</text>
    <text x="270" y="0" class="text-flow" transform="skewX(-15)">Flow</text>
  </g>

  <!-- The Tagline + Green Lines -->
  <g transform="translate(240, 150)">
    <line x1="-10" y1="5" x2="30" y2="5" stroke="#10b981" stroke-width="2"/>
    <text x="40" y="10" class="tagline">OWN YOUR CUSTOMERS. CONTROL YOUR GROWTH.</text>
    <line x1="510" y1="5" x2="550" y2="5" stroke="#10b981" stroke-width="2"/>
  </g>

  <defs>
    <linearGradient id="starGrad" x1="40" y1="40" x2="360" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34d399"/>
      <stop offset="0.5" stop-color="#10b981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>
</svg>
