name: Keep Render Backend Awake

on:
  schedule:
    # Run every 14 minutes (Render sleeps after 15 mins of inactivity)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping WhatsApp Server
        run: |
          curl -s --max-time 10 https://starx-whatsapp-bot.onrender.com/ready
          echo "Ping successful!"
